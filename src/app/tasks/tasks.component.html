
  @if(isAddingTask){
    <app-new-task (cancel)="onCancelAddTask()" (add)="onAddNewTask($event)"/>
  } 
<section id="tasks">
  <header>
    <h2>{{ userName }}'s Tasks</h2>
    <menu>
      <button (click)="onAddTask()">Add Task</button>
    </menu>
  </header>

  <ul>
    @for (task of SelectedUser; track task.id) {
      <li>
        <app-task [task]="task" (complete)="onComplete($event)"></app-task>
      </li>
    }
  </ul>
</section>
